    proyectar(h, "2d")

    transformar(h, "escalar", 2)

    graficar(h)

    '
  python_equivalent: 'h = cobra_holobit("abc")

    cobra_proyectar(h, "2d")

    cobra_transformar(h, "escalar", 2)

    cobra_graficar(h)

    '
  status_source:
    matrix: BACKEND_HOLOBIT_SDK_CAPABILITIES
    key: import_hooks
  backend_equivalents:
    javascript:
      equivalent: 'const h = cobra_holobit("abc");

        cobra_proyectar(h, "2d");

        '
      status: full
      limitations: []
    rust:
      equivalent: 'let h = cobra_holobit("abc");

        let _ = cobra_proyectar(&h, "2d");

        '
      status: full
      limitations: []
    go:
      equivalent: 'h := cobra_holobit("abc")

        _ = cobra_proyectar(h, "2d")

        '
      status: full
      limitations: []
    cpp:
      equivalent: 'auto h = cobra_holobit("abc");

        cobra_proyectar(h, "2d");

        '
      status: full
      limitations: []
    java:
      equivalent: 'var h = CobraRuntime.cobra_holobit("abc");

        CobraRuntime.cobra_proyectar(h, "2d");

