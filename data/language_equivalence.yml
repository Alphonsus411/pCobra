  python_expected_markers:
  - from corelibs import *
  - from standard_library import *
- id: imports_corelibs
  cobra_syntax: 'usar corelibs

    usar standard_library

    mostrar(longitud([1,2,3]))

    '
  python_equivalent: 'from corelibs import *

    from standard_library import *

    print(longitud([1, 2, 3]))

    '
  status_source:
    matrix: BACKEND_COMPATIBILITY
    key: corelibs
  backend_equivalents:
    javascript:
      equivalent: 'import { longitud } from "cobraJsCorelibs";

        import { mostrar } from "cobraJsStandardLibrary";

        '
      status: partial
      limitations:
      - Cobertura parcial vía adaptadores del proyecto.
      expected_markers:
      - import * as io from
      - longitud(3);
    rust:
      equivalent: 'use crate::corelibs::*;

        use crate::standard_library::*;

        '
      status: full
      acceptance_criteria:
      - Incluye imports de `corelibs` y `standard_library` para ruta mínima contractual.
      - La evidencia mínima queda fijada en `tests/integration/transpilers/golden_phase1/rust.imports_corelibs.golden`.
      limitations: []
      expected_markers:
      - use crate::corelibs::*;
      - use crate::standard_library::*;
    go:
      equivalent: 'import _ "pcobra/corelibs"

        import _ "pcobra/standard_library"

        '
      status: full
      acceptance_criteria:
      - Incluye imports de `pcobra/corelibs` y `pcobra/standard_library` en el encabezado.
      - La evidencia mínima queda fijada en `tests/integration/transpilers/golden_phase1/go.imports_corelibs.golden`.
      limitations: []
      expected_markers:
      - '"pcobra/corelibs"'
      - '"pcobra/standard_library"'
    cpp:
      equivalent: '#include "pcobra/corelibs.hpp"

        #include "pcobra/standard_library.hpp"

        '
      status: partial
      limitations:
      - Cobertura mínima orientada a utilidades base.
      expected_markers:
      - '#include <pcobra/corelibs.hpp>'
      - '#include <pcobra/standard_library.hpp>'
    java:
      equivalent: 'import cobra.corelibs.*;

        import cobra.standard_library.*;

        '
      status: partial
      limitations:
      - APIs disponibles son un subconjunto del runtime Python.
      expected_markers:
      - import pcobra.corelibs.*;
      - import pcobra.standard_library.*;
    wasm:
      equivalent: ';; imports host-managed: pcobra:corelibs / pcobra:standard_library

        '
      status: partial
      limitations:
      - Depende completamente del host embebedor.
      expected_markers:
      - (import "pcobra:corelibs" "longitud"
      - (import "pcobra:standard_library" "mostrar"
    asm:
      equivalent: 'CALL longitud

        CALL mostrar

        '
      status: partial
      limitations:
      - Runtime externo requerido para resolver llamadas.
      expected_markers:
      - '; backend asm: imports de runtime administrados externamente'
      - CALL longitud 3
  python_expected_markers:
  - from corelibs import *
  - from standard_library import *
  - longitud(3)
- id: manejo_errores
  cobra_syntax: "intentar:\n    transformar(h, \"operacion_no_soportada\")\ncapturar\
    \ error:\n    mostrar(error)\n"
  python_equivalent: "try:\n    transformar(h, \"operacion_no_soportada\")\nexcept\
    \ Exception as error:\n    print(error)\n"
  status_source:
    matrix: BACKEND_COMPATIBILITY
    key: holobit
  backend_equivalents:
    javascript:
      equivalent: 'try { cobra_transformar(h, "x"); } catch (err) { console.error(err);
        }

        '
      status: partial
      limitations:
      - Errores contractuales explícitos, semántica avanzada no cubierta.
      expected_markers:
      - try {
      - catch (error)
    rust:
      equivalent: "match cobra_transformar(&h, \"x\", &args) {\n    Ok(v) => v,\n\
        \    Err(err) => eprintln!(\"{}\", err),\n}\n"
      status: partial
      limitations:
      - Basado en `Result`, no en excepciones.
      expected_markers:
      - match resultado {
      - Err(e) => {
    go:
      equivalent: 'defer func() { if r := recover(); r != nil { fmt.Println(r) } }()

        '
      status: partial
      limitations:
      - Usa `panic/recover` para contratos no soportados.
      expected_markers:
      - if error := recover(); error != nil {
      - panic("fallo")
    cpp:
      equivalent: 'try { cobra_transformar(h, "x", args); }

        catch (const std::runtime_error& err) { std::cerr << err.what(); }

        '
      status: partial
      limitations:
      - Contrato centrado en `std::runtime_error`.
      expected_markers:
      - try {
      - catch (const std::runtime_error& error)
    java:
      equivalent: 'try { CobraRuntime.transformar(h, "x", args); }

        catch (UnsupportedOperationException err) { System.out.println(err.getMessage());
        }

        '
      status: partial
      limitations:
      - Usa `UnsupportedOperationException` para huecos funcionales.
      expected_markers:
      - try {
      - catch (Exception error)
    wasm:
      equivalent: ';; errores devueltos/propagados por host.

        '
      status: partial
      limitations:
      - Semántica de errores depende del host.
      expected_markers:
      - ';; try/catch emulado: flujo lineal + marca de fallback'
      - ;; catch fallback
    asm:
      equivalent: '; contrato de error vía TRAP

        TRAP

        '
      status: partial
      limitations:
      - Solo señalización de fallo; manejo externo.
      expected_markers:
      - ; try/catch error (try=1, catch=1)
  python_expected_markers:
  - 'try:'
  - 'except Exception as error:'
- id: async
  cobra_syntax: "async def obtener_datos():\n    retornar esperar cliente.fetch()\n"
  python_equivalent: "async def obtener_datos():\n    return await client.fetch()\n"
  status_source:
    matrix: AST_FEATURE_MINIMUM_CONTRACT
    key: async
  backend_equivalents:
    javascript:
      equivalent: 'async function obtenerDatos() { return await client.fetch(); }

        '
      status: full
      limitations: []
      expected_markers:
      - async function obtener_datos()
      - return await fetch();
    rust:
      equivalent: 'async fn obtener_datos() { return fetch().await; }

        '
      status: full
      acceptance_criteria:
      - Emite `async fn` y `.await` para la ruta mínima contractual.
      - La evidencia mínima queda fijada en `tests/integration/transpilers/golden_phase1/rust.async.golden`.
      limitations: []
      expected_markers:
      - async fn obtener_datos() {
      - return fetch().await;
    go:
      equivalent: 'func obtener_datos() any { return cobra_await(fetch()) }

        '
      status: full
      acceptance_criteria:
      - Emite helper `cobra_await(...)` en funciones asincrónicas.
      - La evidencia mínima queda fijada en `tests/integration/transpilers/golden_phase1/go.async.golden`.
      limitations: []
      expected_markers:
      - func obtener_datos() any {
      - return cobra_await(fetch())
    cpp:
      equivalent: '// Equivalente aproximado con std::future/promises.

        '
      status: none
      limitations:
      - Async no garantizado en el contrato actual.
      expected_markers:
      - auto obtener_datos() {
      - NodoEsperar(expresion=NodoLlamadaFuncion(nombre=fetch, argumentos=[]))
    java:
      equivalent: '// Equivalente aproximado con CompletableFuture.

        '
      status: none
      limitations:
      - Async no garantizado por el transpiler actual.
      expected_markers:
      - static void obtener_datos() {
      - NodoEsperar(expresion=NodoLlamadaFuncion(nombre=fetch, argumentos=[]))
    wasm:
      equivalent: ';; asincronía coordinada por host/event loop externo.

        '
      status: none
      limitations:
      - El módulo no garantiza await nativo.
      expected_markers:
      - (func $obtener_datos
      - NodoEsperar(expresion=NodoLlamadaFuncion(nombre=fetch, argumentos=[]))
    asm:
      equivalent: '; cooperativo/manual mediante runtime externo.

        '
      status: partial
      limitations:
      - Sin primitivas async nativas en backend.
      expected_markers:
      - ASYNC FUNC obtener_datos
      - RETURN NodoEsperar(expresion=NodoLlamadaFuncion(nombre=fetch, argumentos=[]))
  python_expected_markers:
  - 'async def obtener_datos():'
  - return await fetch()
