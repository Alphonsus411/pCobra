features:
- id: decoradores
  cobra_syntax: "@traza\ndef saludar(nombre):\n    retornar f\"Hola {nombre}\"\n"
  python_equivalent: "@traza\ndef saludar(nombre):\n    return f\"Hola {nombre}\"\n"
  status_source:
    matrix: AST_FEATURE_MINIMUM_CONTRACT
    key: decoradores
  backend_equivalents:
    javascript:
      equivalent: '@traza

        function saludar(nombre) { return `Hola ${nombre}`; }

        '
      status: full
      limitations: []
      expected_markers:
      - const cobraJsCorelibs = Object.freeze({
      - const mostrar = (...args) => cobraJsStandardLibrary.mostrar(...args);
    rust:
      equivalent: 'fn saludar(nombre: &str) -> String { format!("Hola {}", nombre)
        }

        // decorador aplicado: saludar = traza(saludar)

        '
      status: full
      acceptance_criteria:
      - Emite marcador de decorador y comentario de aplicación en codegen.
      - La evidencia mínima queda fijada en `tests/integration/transpilers/golden_phase1/rust.decoradores.golden`.
      limitations: []
      expected_markers:
      - // @decorador traza
      - '// decorador aplicado: saludar = traza(saludar)'
    go:
      equivalent: "func saludar(nombre string) {\n    // decorador aplicado: saludar\
        \ = traza(saludar)\n}\n"
      status: full
      acceptance_criteria:
      - Emite marcador de decorador y comentario de aplicación en codegen.
      - La evidencia mínima queda fijada en `tests/integration/transpilers/golden_phase1/go.decoradores.golden`.
      limitations: []
      expected_markers:
      - // @decorador traza
      - '// decorador aplicado: saludar = traza(saludar)'
    cpp:
      equivalent: '// Decoradores emulados con wrappers y helpers inline.

        std::string saludar(const std::string& nombre);

        '
      status: partial
      limitations:
      - Sin sintaxis nativa tipo @decorador.
      expected_markers:
      - // @decorador traza
      - auto saludar(auto nombre)
    java:
      equivalent: '// Equivalencia aproximada con anotaciones/proxies.

        String saludar(String nombre) { return "Hola " + nombre; }

        '
      status: partial
      limitations:
      - Se transpila como anotación semántica en comentarios y wrappers.
      expected_markers:
      - import pcobra.corelibs.*;
      - public class Main {
    wasm:
      equivalent: ';; Decoradores emulados en host/runtime previo al módulo.

        '
      status: partial
      limitations:
      - Requiere soporte del host para instrumentación.
      expected_markers:
      - ;; @decorador (local.get $traza)
      - (func $saludar (param $nombre i32)
    asm:
      equivalent: '; Hook manual previo a CALL objetivo.

        '
      status: partial
      limitations:
      - Instrumentación manual, sin sintaxis declarativa.
      expected_markers:
      - '; backend asm: imports de runtime administrados externamente'
