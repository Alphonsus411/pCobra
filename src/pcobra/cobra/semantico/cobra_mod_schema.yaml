type: object
patternProperties:
  '.*\.co$':
    type: object
    propertyNames:
      enum:
        - version
        - python
        - rust
        - javascript
        - wasm
        - go
        - cpp
        - java
        - asm
    required:
      - version
    properties:
      version:
        type: string
        pattern: '^(0|[1-9]\d*)\.(0|[1-9]\d*)\.(0|[1-9]\d*)(?:[-+].*)?$'
      python:
        type: string
      rust:
        type: string
      javascript:
        type: string
      wasm:
        type: string
      go:
        type: string
      cpp:
        type: string
      java:
        type: string
      asm:
        type: string
    additionalProperties: false
properties:
  lock:
    type: object
additionalProperties: false
