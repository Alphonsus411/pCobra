name: "Custom CodeQL config"
paths:
  - src
paths-ignore:
  - 'venv/**'
  - '.venv/**'
  - '.venv-release-test/**'
  - 'venv-testpypi/**'
  - '**/__pycache__/**'
queries:
  - uses: ./.github/codeql/custom/ast-no-type-validation.ql
  - uses: ./.github/codeql/custom/missing-codegen-exception.ql
  - uses: ./.github/codeql/custom/unsafe-eval-exec.ql
