name: Actualizar dependencias

on:
  workflow_dispatch:
  schedule:
    - cron: '0 6 * * 1'

permissions:
  contents: write
  pull-requests: write

jobs:
  update-dependencies:
    name: Regenerar archivos de dependencias
    runs-on: ubuntu-latest

    steps:
      - name: Obtener el código
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Configurar Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Regenerar requirements desde pyproject.toml
        run: bash scripts/sync_requirements.sh --upgrade

      - name: Comprobar cambios
        run: |
          git status --short
          git diff

      - name: Crear Pull Request de actualización
        uses: peter-evans/create-pull-request@v7
        with:
          commit-message: 'chore: actualizar dependencias automáticamente'
          title: 'chore: actualizar dependencias automáticamente'
          body: |
            ## Resumen
            - Ejecutar `scripts/sync_requirements.sh --upgrade` para regenerar locks desde `pyproject.toml`.
            - Actualizar `requirements.txt`, `requirements-dev.txt` y `docs/requirements.txt`.
          branch: chore/auto-update-dependencies
          delete-branch: true
          token: ${{ secrets.GITHUB_TOKEN }}
