name: tests

on:
  push:
    paths: ['**/*.py', 'src/tests/**', '.github/workflows/test.yml']
  pull_request:
    paths: ['**/*.py', 'src/tests/**', '.github/workflows/test.yml']
  schedule:
    - cron: '30 3 * * *'
  workflow_dispatch:

permissions:
  contents: read
  security-events: write

jobs:
  tier1-required:
    if: github.event_name != 'schedule'
    strategy:
      matrix:
        os: [ubuntu-latest, windows-latest]
    runs-on: ${{ matrix.os }}
    steps:
      - uses: actions/checkout@08eba0b27e820071cde6df949e0beb9ba4906955  # Fijado a commit para seguridad de la cadena de suministro.
        with:
          fetch-depth: 0
      - uses: actions/setup-python@a26af69be951a213d495a4c3e4e4022e16d87065 # v5
        with:
          python-version: '3.11'
          cache: 'pip'
          cache-dependency-path: |
            requirements.txt
            requirements-dev.txt
      - uses: actions/setup-node@49933ea5288caeca8642d1e84afbd3f7d6820020 # v4
        with:
          node-version: '20'
      - name: Install system packages (Linux)
        if: runner.os == 'Linux'
        run: |
          sudo apt-get update
          sudo apt-get install -y gcc g++ golang-go rustc default-jdk
      - name: Install system packages (Windows)
        if: runner.os == 'Windows'
        shell: pwsh
        run: |
          choco install -y --no-progress mingw golang rust openjdk
      - name: Install dependencies
        uses: ./.github/actions/install
        with:
          extra: "flask requests"
      - name: Run smoke syntax gates
        if: runner.os != 'Windows'
        shell: bash
        run: |
          python scripts/smoke_syntax.py
          python scripts/smoke_transpilers_syntax.py
      - name: Run smoke syntax gates (Windows)
        if: runner.os == 'Windows'
        shell: pwsh
        run: |
          python scripts/smoke_syntax.py
          python scripts/smoke_transpilers_syntax.py
      - name: Verify extra packages
        if: runner.os != 'Windows'
        shell: bash
        run: |
          python - <<'PY'
          import flask, requests
          PY
      - name: Verify extra packages (Windows)
        if: runner.os == 'Windows'
        shell: pwsh
        run: |
          python -c "import flask, requests"
      - name: Scan for secrets
        if: runner.os == 'Linux'
        uses: gitleaks/gitleaks-action@ff98106e4c7b2bc287b24eaf42907196329070c7 # v2.3.9
        with:
          config-path: gitleaks.toml
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
      - name: Skip secret scan on non-Linux runners
        if: runner.os != 'Linux'
        run: echo "Secret scanning sólo está disponible en runners Linux."
      - name: Validate targets anti-regression policy
        if: runner.os != 'Windows'
        shell: bash
        run: python scripts/ci/validate_targets.py
      - name: Validate public documentation targets policy
        if: runner.os != 'Windows'
        shell: bash
        run: python scripts/validate_targets_policy.py
      - name: Validate policy drift in public target text
        if: runner.os != 'Windows'
        shell: bash
        run: python scripts/lint_policy_drift.py
      - name: Regenerate targets docs and verify clean diff
        if: runner.os != 'Windows'
        shell: bash
        run: |
          python scripts/generate_target_policy_docs.py
          python scripts/generar_matriz_transpiladores.py
          git diff --exit-code -- docs/targets_policy.md docs/matriz_transpiladores.md docs/matriz_transpiladores.csv docs/_generated README.md docs/README.en.md
      - name: Validate syntax report JSON contract
        if: runner.os != 'Windows'
        shell: bash
        run: python scripts/ci/validate_syntax_report_contract.py
      - name: Validate syntax report JSON contract (Windows)
        if: runner.os == 'Windows'
        shell: pwsh
        run: python scripts/ci/validate_syntax_report_contract.py
      - name: Validate runtime contract matrix
        if: runner.os != 'Windows'
        shell: bash
        run: python scripts/validate_runtime_contract.py
      - name: Validate workflow target policy
        if: runner.os != 'Windows'
        shell: bash
        run: python scripts/ci/validate_workflow_target_matrix.py
      - name: Validate targets anti-regression policy (Windows)
        if: runner.os == 'Windows'
        shell: pwsh
        run: python scripts/ci/validate_targets.py
      - name: Validate public documentation targets policy (Windows)
        if: runner.os == 'Windows'
        shell: pwsh
        run: python scripts/validate_targets_policy.py
      - name: Validate policy drift in public target text (Windows)
        if: runner.os == 'Windows'
        shell: pwsh
        run: python scripts/lint_policy_drift.py
      - name: Regenerate targets docs and verify clean diff (Windows)
        if: runner.os == 'Windows'
        shell: pwsh
        run: |
          python scripts/generate_target_policy_docs.py
          python scripts/generar_matriz_transpiladores.py
          git diff --exit-code -- docs/targets_policy.md docs/matriz_transpiladores.md docs/matriz_transpiladores.csv docs/_generated README.md docs/README.en.md
      - name: Validate runtime contract matrix (Windows)
        if: runner.os == 'Windows'
        shell: pwsh
        run: python scripts/validate_runtime_contract.py
      - name: Validate workflow target policy (Windows)
        if: runner.os == 'Windows'
        shell: pwsh
        run: python scripts/ci/validate_workflow_target_matrix.py
      - name: Run linters
        if: runner.os != 'Windows'
        shell: bash
        run: |
          make lint
          make typecheck
      - name: Run linters (Windows)
        if: runner.os == 'Windows'
        shell: pwsh
        run: |
          ./make.bat lint
          ./make.bat typecheck
      - name: Run tests
        if: runner.os != 'Windows'
        shell: bash
        run: |
          pytest tests/integration/transpilers/test_official_backends_tier1.py \
            tests/integration/transpilers/test_official_backends_contracts.py

          paths=()
          if [ -d tests ]; then
            paths+=("tests")
          fi
          if [ -d src/tests ]; then
            paths+=("src/tests")
          fi

          if [ "${#paths[@]}" -eq 0 ]; then
            echo "No se encontraron directorios de pruebas."
            exit 1
          fi

          pytest "${paths[@]}" --cov=src --cov-report=xml \
            --cov-fail-under=95
      - name: Run tests (Windows)
        if: runner.os == 'Windows'
        shell: pwsh
        run: |
          pytest tests/integration/transpilers/test_official_backends_tier1.py tests/integration/transpilers/test_official_backends_contracts.py

          $paths = @()
          if (Test-Path tests) {
            $paths += 'tests'
          }
          if (Test-Path 'src/tests') {
            $paths += 'src/tests'
          }

          if ($paths.Count -eq 0) {
            Write-Error 'No se encontraron directorios de pruebas.'
            exit 1
          }

          pytest $paths `
            --cov=src `
            --cov-report=xml `
            --cov-fail-under=95
      - name: Upload coverage to Codecov
        uses: codecov/codecov-action@fdcc8476540edceab3de004e990f80d881c6cc00 # v5
        with:
          files: coverage.xml
      - uses: actions/upload-artifact@ea165f8d65b6e75b540449e92b4886f43607fa02 # v4
        with:
          name: coverage-report-tier1
          path: coverage.xml


  tier2-nightly-partial:
    name: Tier 2 nightly partial matrix
    if: github.event_name == 'schedule' || github.event_name == 'workflow_dispatch'
    runs-on: ubuntu-latest
    strategy:
      matrix:
        python-version: ['3.11', '3.12']
    steps:
      - uses: actions/checkout@08eba0b27e820071cde6df949e0beb9ba4906955
        with:
          fetch-depth: 0
      - uses: actions/setup-python@a26af69be951a213d495a4c3e4e4022e16d87065
        with:
          python-version: ${{ matrix.python-version }}
          cache: 'pip'
          cache-dependency-path: |
            requirements.txt
            requirements-dev.txt
      - uses: actions/setup-node@49933ea5288caeca8642d1e84afbd3f7d6820020
        with:
          node-version: '20'
      - name: Install system packages
        shell: bash
        run: |
          sudo apt-get update
          sudo apt-get install -y gcc g++ golang-go rustc default-jdk
      - name: Install dependencies
        uses: ./.github/actions/install
      - name: Validate workflow target policy
        shell: bash
        run: python scripts/ci/validate_workflow_target_matrix.py
      - name: Run Tier 2 backend suite
        shell: bash
        run: |
          pytest tests/integration/transpilers/test_official_backends_tier2.py
          pytest tests/integration/test_holobit_tiers.py


  contractual-compatibility:
    name: Contractual compatibility gate
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@08eba0b27e820071cde6df949e0beb9ba4906955  # Fijado a commit para seguridad de la cadena de suministro.
        with:
          fetch-depth: 0
      - uses: actions/setup-python@a26af69be951a213d495a4c3e4e4022e16d87065 # v5
        with:
          python-version: '3.11'
          cache: 'pip'
          cache-dependency-path: |
            requirements.txt
            requirements-dev.txt
      - uses: actions/setup-node@49933ea5288caeca8642d1e84afbd3f7d6820020 # v4
        with:
          node-version: '20'
      - name: Install system packages
        run: |
          sudo apt-get update
          sudo apt-get install -y gcc g++ golang-go rustc default-jdk
      - name: Install dependencies
        uses: ./.github/actions/install
      - name: Run contractual compatibility suites (blocking)
        shell: bash
        run: |
          pytest tests/integration/test_holobit_tiers.py \
            tests/integration/transpilers/test_official_backends_contracts.py
