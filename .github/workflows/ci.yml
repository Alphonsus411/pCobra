name: CI

permissions:
  contents: read

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]
  schedule:
    - cron: '0 3 * * *'
  workflow_dispatch:

jobs:
  tier1-required:
    env:
      SAFETY_API_KEY: ${{ secrets.SAFETY_API_KEY }}
    if: github.event_name != 'schedule'
    strategy:
      matrix:
        os: [ubuntu-latest, windows-latest]
        python-version: ['3.11']
    runs-on: ${{ matrix.os }}
    steps:
      - uses: actions/checkout@08eba0b27e820071cde6df949e0beb9ba4906955  # Fijado a commit para seguridad de la cadena de suministro.
        with:
          fetch-depth: 0
      - uses: actions/setup-python@a26af69be951a213d495a4c3e4e4022e16d87065 # v5
        with:
          python-version: ${{ matrix.python-version }}
          cache: 'pip'
          cache-dependency-path: |
            requirements.txt
            requirements-dev.txt
      - uses: actions/setup-node@49933ea5288caeca8642d1e84afbd3f7d6820020 # v4
        with:
          node-version: '20'
          cache: 'npm'
          cache-dependency-path: '**/package-lock.json'
      - name: Install system packages (Linux)
        if: runner.os == 'Linux'
        shell: bash
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            gcc g++ golang-go rustc default-jdk clang
      - name: Install system packages (Windows)
        if: runner.os == 'Windows'
        shell: pwsh
        run: |
          choco install -y --no-progress mingw golang rust openjdk
      - name: Install dependencies
        uses: ./.github/actions/install
        with:
          extra: "sphinx sphinx-rtd-theme pytest-cov codecov pyright"
      - name: Run smoke syntax gates
        if: runner.os != 'Windows'
        shell: bash
        run: |
          python scripts/smoke_syntax.py
          python scripts/smoke_transpilers_syntax.py
      - name: Run smoke syntax gates (Windows)
        if: runner.os == 'Windows'
        shell: pwsh
        run: |
          python scripts/smoke_syntax.py
          python scripts/smoke_transpilers_syntax.py
      - name: Verify extra packages
        if: runner.os != 'Windows'
        shell: bash
        run: |
          python - <<'PY'
          import importlib, sys

          required_modules = ["sphinx"]
          missing = []
          for module in required_modules:
              try:
                  importlib.import_module(module)
              except ImportError:
                  missing.append(module)

          if missing:
              sys.exit(f"Faltan módulos de Python: {', '.join(missing)}")
          PY
          pyright --version
      - name: Verify extra packages (Windows)
        if: runner.os == 'Windows'
        shell: pwsh
        run: |
          python - <<'PY'
          import importlib, sys

          required_modules = ["sphinx"]
          missing = []
          for module in required_modules:
              try:
                  importlib.import_module(module)
              except ImportError:
                  missing.append(module)

          if missing:
              sys.exit(f"Faltan módulos de Python: {', '.join(missing)}")
          PY
          pyright --version
      - name: Seguridad de dependencias
        if: env.SAFETY_API_KEY != ''
        shell: bash
        run: |
          pip install safety
          safety check --full-report --key "$SAFETY_API_KEY"
      - name: Omitir seguridad de dependencias
        if: env.SAFETY_API_KEY == ''
        run: echo "SAFETY_API_KEY no presente. Omitiendo verificación de dependencias."
      - name: Scan for secrets
        if: runner.os == 'Linux'
        uses: gitleaks/gitleaks-action@ff98106e4c7b2bc287b24eaf42907196329070c7 # v2.3.9
        with:
          config-path: gitleaks.toml
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
      - name: Skip secret scan on non-Linux runners
        if: runner.os != 'Linux'
        run: echo "Secret scanning sólo está disponible en runners Linux."
      - name: Run linters
        if: runner.os != 'Windows'
        shell: bash
        run: make lint
      - name: Run linters (Windows)
        if: runner.os == 'Windows'
        shell: pwsh
        run: ./make.bat lint
      - name: Run type checks
        if: runner.os != 'Windows'
        shell: bash
        run: make typecheck  # Ejecuta mypy y pyright
      - name: Run type checks (Windows)
        if: runner.os == 'Windows'
        shell: pwsh
        run: ./make.bat typecheck  # Ejecuta mypy y pyright
      - name: Validate changelog
        shell: bash
        run: python scripts/check_changelog.py
      - name: Validate targets anti-regression policy
        shell: bash
        run: python scripts/ci/validate_targets.py
      - name: Run target contract audit gate
        shell: bash
        env:
          AUDIT_BASE_SHA: ${{ github.event.pull_request.base.sha || github.event.before }}
          AUDIT_HEAD_SHA: ${{ github.sha }}
        run: python scripts/ci/audit_targets_contract.py "${AUDIT_BASE_SHA}" "${AUDIT_HEAD_SHA}"
      - name: Run language feature rollout gate
        shell: bash
        env:
          AUDIT_BASE_SHA: ${{ github.event.pull_request.base.sha || github.event.before }}
          AUDIT_HEAD_SHA: ${{ github.sha }}
        run: python scripts/ci/audit_feature_rollout.py --base "${AUDIT_BASE_SHA}" --head "${AUDIT_HEAD_SHA}"
      - name: Validate public documentation targets policy
        shell: bash
        run: python scripts/validate_targets_policy.py
      - name: Validate policy drift in public target text
        shell: bash
        run: python scripts/lint_policy_drift.py
      - name: Regenerate targets docs and verify clean diff
        shell: bash
        run: |
          python scripts/generate_target_policy_docs.py
          python scripts/generar_matriz_transpiladores.py
          git diff --exit-code -- docs/targets_policy.md docs/matriz_transpiladores.md docs/matriz_transpiladores.csv docs/_generated README.md docs/README.en.md
      - name: Validate autogenerated technical manual sync
        shell: bash
        run: python scripts/ci/check_manual_ref_generated.py
      - name: Validate syntax report JSON contract
        shell: bash
        run: python scripts/ci/validate_syntax_report_contract.py
      - name: Lint public surfaces without direct transpiler imports
        run: python scripts/ci/lint_public_no_direct_transpiler_imports.py
      - name: Lint legacy bindings imports in src
        run: python scripts/ci/lint_no_legacy_bindings_imports.py
      - name: Lint legacy cobra tree is shim-only
        run: python scripts/ci/lint_legacy_cobra_shims.py
      - name: Lint canonical import resolution contract
        run: python scripts/ci/lint_import_resolution_contract.py
      - name: Lint no cross command imports in CLI commands
        run: python scripts/ci/lint_no_cross_command_imports.py
      - name: Gate de arquitectura de imports (ciclos y capas)
        shell: bash
        run: python scripts/ci/check_import_cycles.py
      - name: Validate runtime contract matrix
        shell: bash
        run: python scripts/validate_runtime_contract.py
      - name: Validate libro documentation drift
        shell: bash
        run: python scripts/sync_libro_programacion.py --check
      - name: Validate workflow target policy
        shell: bash
        run: python scripts/ci/validate_workflow_target_matrix.py
      - name: Validate no duplicated public backend literals
        shell: bash
        run: python scripts/ci/validate_public_backend_literals.py
      - name: Validate public import boundaries against internal_compat
        shell: bash
        run: python scripts/ci/check_public_import_boundaries.py
      - name: Lint legacy target aliases in tests/docs
        shell: bash
        run: python scripts/lint_legacy_aliases.py
      - name: Validate `src/` imports do not depend on `scripts.*`
        shell: bash
        run: python scripts/ci/check_no_scripts_imports.py
      - name: Packaging check (Linux/macOS)
        if: runner.os != 'Windows'
        shell: bash
        run: |
          rm -rf dist
          python -m pip install --upgrade build
          python -m build --wheel --sdist --outdir dist
          python - <<'PY'
          import pathlib
          import zipfile

          wheels = sorted(pathlib.Path('dist').glob('*.whl'))
          if not wheels:
              raise SystemExit('No se encontró wheel en dist/.')

          wheel = wheels[0]
          with zipfile.ZipFile(wheel) as zf:
              names = zf.namelist()
              if any('/tests/' in n or n.endswith('/tests') for n in names):
                  raise SystemExit('El wheel incluye directorios de pruebas y no debería.')
              if any('/stubs/' in n or n.endswith('/stubs') for n in names):
                  raise SystemExit('El wheel incluye directorios stubs y no debería.')
              retired_tokens = ('archive/retired_targets', 'docs/historico', 'docs/experimental')
              for token in retired_tokens:
                  if any(token in n.lower() for n in names):
                      raise SystemExit(f'El wheel incluye contenidos retirados fuera de política: {token}')
          print(f'Wheel inspeccionado correctamente: {wheel.name}')
          PY
          python - <<'PY'
          import os
          import pathlib
          import subprocess
          import sys
          import tempfile
          import venv

          dist = pathlib.Path('dist')
          wheels = sorted(dist.glob('*.whl'))
          sdists = sorted(dist.glob('*.tar.gz'))
          if not wheels or not sdists:
              raise SystemExit('Packaging smoke: faltan wheel/sdist en dist/.')

          with tempfile.TemporaryDirectory(prefix='pcobra-packaging-smoke-') as tmp:
              venv_dir = pathlib.Path(tmp) / 'venv'
              venv.EnvBuilder(with_pip=True, clear=True).create(venv_dir)
              bindir = 'Scripts' if os.name == 'nt' else 'bin'
              python_bin = venv_dir / bindir / ('python.exe' if os.name == 'nt' else 'python')
              pip_bin = venv_dir / bindir / ('pip.exe' if os.name == 'nt' else 'pip')
              cobra_bin = venv_dir / bindir / ('cobra.exe' if os.name == 'nt' else 'cobra')

              subprocess.run(
                  [str(pip_bin), 'install', '--no-deps', '--force-reinstall', str(wheels[0])],
                  check=True,
              )
              smoke = subprocess.run(
                  [str(cobra_bin), '--ayuda'],
                  check=False,
                  capture_output=True,
                  text=True,
                  cwd=tmp,
              )
              if smoke.returncode != 0:
                  raise SystemExit(
                      'Packaging smoke: `cobra --ayuda` falló en entorno limpio '
                      f'con código={smoke.returncode} stderr={smoke.stderr!r}'
                  )
              stderr = smoke.stderr or ''
              forbidden = ('ModuleNotFoundError', 'scripts.benchmarks')
              hit = [token for token in forbidden if token in stderr]
              if hit:
                  raise SystemExit(
                      'Packaging smoke: stderr contiene tokens prohibidos '
                      f'{hit!r}. stderr={stderr!r}'
                  )
              subprocess.run(
                  [
                      str(python_bin),
                      '-I',
                      '-c',
                      'import importlib; '
                      'modules = ['
                      '"pcobra.cobra", "pcobra.standard_library", "pcobra.lsp", "pcobra.gui"'
                      ']; '
                      '[importlib.import_module(m) for m in modules]; '
                      'print("Smoke import de módulos críticos OK.")',
                  ],
                  check=True,
              )
          PY
          pytest tests/cli/test_packaging_smoke.py -m integration -q
      - name: Packaging check (Windows)
        if: runner.os == 'Windows'
        shell: pwsh
        run: |
          if (Test-Path dist) { Remove-Item dist -Recurse -Force }
          python -m pip install --upgrade build
          python -m build --wheel --sdist --outdir dist
          python - <<'PY'
          import pathlib
          import zipfile

          wheels = sorted(pathlib.Path('dist').glob('*.whl'))
          if not wheels:
              raise SystemExit('No se encontró wheel en dist/.')

          wheel = wheels[0]
          with zipfile.ZipFile(wheel) as zf:
              names = zf.namelist()
              if any('/tests/' in n or n.endswith('/tests') for n in names):
                  raise SystemExit('El wheel incluye directorios de pruebas y no debería.')
              if any('/stubs/' in n or n.endswith('/stubs') for n in names):
                  raise SystemExit('El wheel incluye directorios stubs y no debería.')
              retired_tokens = ('archive/retired_targets', 'docs/historico', 'docs/experimental')
              for token in retired_tokens:
                  if any(token in n.lower() for n in names):
                      raise SystemExit(f'El wheel incluye contenidos retirados fuera de política: {token}')
          print(f'Wheel inspeccionado correctamente: {wheel.name}')
          PY
          python - <<'PY'
          import os
          import pathlib
          import subprocess
          import tempfile
          import venv

          dist = pathlib.Path('dist')
          wheels = sorted(dist.glob('*.whl'))
          sdists = sorted(dist.glob('*.tar.gz'))
          if not wheels or not sdists:
              raise SystemExit('Packaging smoke: faltan wheel/sdist en dist/.')

          with tempfile.TemporaryDirectory(prefix='pcobra-packaging-smoke-') as tmp:
              venv_dir = pathlib.Path(tmp) / 'venv'
              venv.EnvBuilder(with_pip=True, clear=True).create(venv_dir)
              bindir = 'Scripts' if os.name == 'nt' else 'bin'
              python_bin = venv_dir / bindir / ('python.exe' if os.name == 'nt' else 'python')
              pip_bin = venv_dir / bindir / ('pip.exe' if os.name == 'nt' else 'pip')
              cobra_bin = venv_dir / bindir / ('cobra.exe' if os.name == 'nt' else 'cobra')

              subprocess.run(
                  [str(pip_bin), 'install', '--no-deps', '--force-reinstall', str(wheels[0])],
                  check=True,
              )
              smoke = subprocess.run(
                  [str(cobra_bin), '--ayuda'],
                  check=False,
                  capture_output=True,
                  text=True,
                  cwd=tmp,
              )
              if smoke.returncode != 0:
                  raise SystemExit(
                      'Packaging smoke: `cobra --ayuda` falló en entorno limpio '
                      f'con código={smoke.returncode} stderr={smoke.stderr!r}'
                  )
              stderr = smoke.stderr or ''
              forbidden = ('ModuleNotFoundError', 'scripts.benchmarks')
              hit = [token for token in forbidden if token in stderr]
              if hit:
                  raise SystemExit(
                      'Packaging smoke: stderr contiene tokens prohibidos '
                      f'{hit!r}. stderr={stderr!r}'
                  )
              subprocess.run(
                  [
                      str(python_bin),
                      '-I',
                      '-c',
                      'import importlib; '
                      'modules = ['
                      '"pcobra.cobra", "pcobra.standard_library", "pcobra.lsp", "pcobra.gui"'
                      ']; '
                      '[importlib.import_module(m) for m in modules]; '
                      'print("Smoke import de módulos críticos OK.")',
                  ],
                  check=True,
              )
          PY
          pytest tests/cli/test_packaging_smoke.py -m integration -q
      - name: Run Tier 1 backend suite (required on PR)
        if: runner.os != 'Windows'
        shell: bash
        run: |
          pytest tests/integration/transpilers/test_official_backends_tier1.py

      - name: Run tests
        if: runner.os != 'Windows'
        shell: bash
        run: |
          paths=()
          if [ -d tests ]; then
            paths+=("tests")
          fi
          if [ -d src/tests ]; then
            paths+=("src/tests")
          fi

          if [ "${#paths[@]}" -eq 0 ]; then
            echo "No se encontraron directorios de pruebas."
            exit 1
          fi

          pytest "${paths[@]}" --cov=src --cov-report=xml \
            --cov-report=term-missing --cov-fail-under=95 -m "not windows"
          pytest "${paths[@]}" -m windows
      - name: Run Tier 1 backend suite (Windows, required on PR)
        if: runner.os == 'Windows'
        shell: pwsh
        run: |
          pytest tests/integration/transpilers/test_official_backends_tier1.py

      - name: Run tests (Windows)
        if: runner.os == 'Windows'
        shell: pwsh
        run: |
          $paths = @()
          if (Test-Path tests) {
            $paths += 'tests'
          }
          if (Test-Path 'src/tests') {
            $paths += 'src/tests'
          }

          if ($paths.Count -eq 0) {
            Write-Error 'No se encontraron directorios de pruebas.'
            exit 1
          }

          pytest $paths `
            --cov=src `
            --cov-report=xml `
            --cov-report=term-missing `
            --cov-fail-under=95 `
            -m 'not windows'
          pytest $paths -m windows
      - name: Upload coverage to Codecov
        uses: codecov/codecov-action@fdcc8476540edceab3de004e990f80d881c6cc00 # v5
        with:
          files: coverage.xml
      - name: Build docs
        shell: bash
        run: sphinx-build -b html docs/frontend docs/build/html
      - name: Check doc links
        shell: bash
        run: sphinx-build -b linkcheck docs/frontend docs/build/linkcheck


  tier2-nightly-partial:
    name: Tier 2 nightly partial matrix
    if: github.event_name == 'schedule' || github.event_name == 'workflow_dispatch'
    runs-on: ubuntu-latest
    strategy:
      matrix:
        python-version: ['3.11', '3.12']
    steps:
      - uses: actions/checkout@08eba0b27e820071cde6df949e0beb9ba4906955
        with:
          fetch-depth: 0
      - uses: actions/setup-python@a26af69be951a213d495a4c3e4e4022e16d87065
        with:
          python-version: ${{ matrix.python-version }}
          cache: 'pip'
          cache-dependency-path: |
            requirements.txt
            requirements-dev.txt
      - uses: actions/setup-node@49933ea5288caeca8642d1e84afbd3f7d6820020
        with:
          node-version: '20'
      - name: Install system packages
        shell: bash
        run: |
          sudo apt-get update
          sudo apt-get install -y gcc g++ golang-go rustc default-jdk
      - name: Install dependencies
        uses: ./.github/actions/install
      - name: Validate workflow target policy
        shell: bash
        run: python scripts/ci/validate_workflow_target_matrix.py
      - name: Validate no duplicated public backend literals
        shell: bash
        run: python scripts/ci/validate_public_backend_literals.py
      - name: Validate public import boundaries against internal_compat
        shell: bash
        run: python scripts/ci/check_public_import_boundaries.py
      - name: Run Tier 2 backend suite
        shell: bash
        run: |
          pytest tests/integration/transpilers/test_official_backends_tier2.py

  dependency-drift:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@08eba0b27e820071cde6df949e0beb9ba4906955
      - uses: actions/setup-python@a26af69be951a213d495a4c3e4e4022e16d87065
        with:
          python-version: '3.11'
      - name: Verificar sincronización de dependencias
        shell: bash
        run: bash scripts/check_requirements_drift.sh

  benchmarks:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@08eba0b27e820071cde6df949e0beb9ba4906955  # Fijado a commit para seguridad de la cadena de suministro.
        with:
          fetch-depth: 0
      - uses: actions/setup-python@a26af69be951a213d495a4c3e4e4022e16d87065 # v5
        with:
          python-version: '3.11'
          cache: 'pip'
          cache-dependency-path: |
            requirements.txt
            requirements-dev.txt
      - uses: actions/setup-node@49933ea5288caeca8642d1e84afbd3f7d6820020 # v4
        with:
          node-version: '20'
          cache: 'npm'
          cache-dependency-path: '**/package-lock.json'
      - name: Install system packages
        run: |
          sudo apt-get update
          sudo apt-get install -y gcc g++ golang-go rustc default-jdk
      - name: Install dependencies
        uses: ./.github/actions/install
        with:
          extra: "sphinx sphinx-rtd-theme pytest-cov codecov pyright"
      - name: Verify extra packages
        if: runner.os != 'Windows'
        shell: bash
        run: |
          python - <<'PY'
          import importlib, sys

          required_modules = ["sphinx"]
          missing = []
          for module in required_modules:
              try:
                  importlib.import_module(module)
              except ImportError:
                  missing.append(module)

          if missing:
              sys.exit(f"Faltan módulos de Python: {', '.join(missing)}")
          PY
          pyright --version
      - name: Verify extra packages (Windows)
        if: runner.os == 'Windows'
        shell: pwsh
        run: |
          python - <<'PY'
          import importlib, sys

          required_modules = ["sphinx"]
          missing = []
          for module in required_modules:
              try:
                  importlib.import_module(module)
              except ImportError:
                  missing.append(module)

          if missing:
              sys.exit(f"Faltan módulos de Python: {', '.join(missing)}")
          PY
          pyright --version
      - name: Compare benchmarks
        run: |
          python scripts/benchmarks/compare_releases.py \
            --output benchmarks_compare.json \
            --max-regression 10
      - name: Upload benchmark results
        uses: actions/upload-artifact@ea165f8d65b6e75b540449e92b4886f43607fa02 # v4
        with:
          name: benchmarks_compare
          path: benchmarks_compare.json
      - name: Publicar resumen
        run: |
          python - <<'PY'
          import json, os

          data = json.load(open('benchmarks_compare.json'))
          lines = [
              "### Resultados de benchmarks",
              "",
              "| Backend | Δ Tiempo (s) | Δ Memoria (kB) |",
              "| --- | --- | --- |",
          ]
          for d in data:
              dt = d["diff_time"]
              dm = d["diff_memory_kb"]
              dt_str = f"{dt:+.4f}" if dt is not None else "N/A"
              dm_str = f"{dm:+d}" if dm is not None else "N/A"
              lines.append(f"| {d['backend']} | {dt_str} | {dm_str} |")

          with open(os.environ["GITHUB_STEP_SUMMARY"], "a") as fh:
              fh.write("\n".join(lines))
          PY


  contractual-compatibility-gate:
    name: Contractual compatibility gate
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@08eba0b27e820071cde6df949e0beb9ba4906955  # Fijado a commit para seguridad de la cadena de suministro.
        with:
          fetch-depth: 0
      - uses: actions/setup-python@a26af69be951a213d495a4c3e4e4022e16d87065 # v5
        with:
          python-version: '3.11'
          cache: 'pip'
          cache-dependency-path: |
            requirements.txt
            requirements-dev.txt
      - uses: actions/setup-node@49933ea5288caeca8642d1e84afbd3f7d6820020 # v4
        with:
          node-version: '20'
      - name: Install system packages
        shell: bash
        run: |
          sudo apt-get update
          sudo apt-get install -y gcc g++ golang-go rustc default-jdk
      - name: Install dependencies
        uses: ./.github/actions/install
      - name: Run contractual compatibility suites (blocking)
        shell: bash
        run: |
          pytest tests/integration/test_holobit_tiers.py \
            tests/integration/transpilers/test_official_backends_contracts.py \
            tests/integration/transpilers/test_library_compatibility_matrix.py
      - name: Validate technical library compatibility matrix
        shell: bash
        run: python scripts/ci/validate_library_compatibility_matrix.py
