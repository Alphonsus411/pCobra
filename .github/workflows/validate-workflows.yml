name: Validar workflows
permissions:
  contents: read

on:
  push:
    paths:
      - '.github/workflows/**'
  pull_request:
    paths:
      - '.github/workflows/**'

jobs:
  actionlint:
    name: Ejecutar actionlint
    runs-on: ubuntu-latest
    steps:
      - name: Checkout del repositorio
        uses: actions/checkout@v4

      - name: Instalar actionlint
        run: |
          curl -sSfL https://raw.githubusercontent.com/rhysd/actionlint/main/scripts/download-actionlint.bash \
            | bash -s -- -b ./bin

      - name: Analizar workflows
        run: ./bin/actionlint -color

      - name: Configurar Python para validaciones de política
        uses: actions/setup-python@a26af69be951a213d495a4c3e4e4022e16d87065
        with:
          python-version: '3.11'

      - name: Validar política de targets en workflows
        run: python scripts/ci/validate_workflow_target_matrix.py
